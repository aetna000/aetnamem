name: publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit-tests:
    name: Python ${{ matrix.python-version }} tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install -e ".[dev]"
      - run: python -m pytest -q

  openclaw-plugin:
    name: OpenClaw plugin checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: integrations/openclaw
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: integrations/openclaw/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e ../..
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - name: Run OpenClaw tests with visible failure annotation
        shell: bash
        run: |
          set +e
          output=$(npm test 2>&1)
          status=$?
          printf '%s\n' "$output"
          if [ "$status" -ne 0 ]; then
            output=${output//'%'/'%25'}
            output=${output//$'\r'/'%0D'}
            output=${output//$'\n'/'%0A'}
            echo "::error title=OpenClaw test failure::$output"
            exit "$status"
          fi
      - run: npm run smoke

  build:
    name: Build release artifacts
    needs: [unit-tests, openclaw-plugin]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build dependencies
        run: python -m pip install --upgrade pip build twine
      - name: Require tag to match package version
        if: github.ref_type == 'tag'
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          project = tomllib.loads(Path("pyproject.toml").read_text())["project"]
          expected = f"v{project['version']}"
          actual = os.environ["RELEASE_TAG"]
          if actual != expected:
              raise SystemExit(f"release tag {actual!r} must equal {expected!r}")
          PY
      - name: Build distributions
        run: python -m build
      - name: Check distributions
        run: python -m twine check dist/*
      - name: Rebuild wheel from source distribution
        run: python -m pip wheel --no-deps --wheel-dir rebuilt dist/*.tar.gz
      - uses: actions/upload-artifact@v4
        with:
          name: release-distributions
          path: dist/

  installed-wheel:
    name: Python ${{ matrix.python-version }} installed wheel
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: actions/download-artifact@v4
        with:
          name: release-distributions
          path: dist
      - name: Install and exercise wheel
        run: |
          python -m pip install dist/*.whl
          python -m pip check
          cd "$RUNNER_TEMP"
          python "$GITHUB_WORKSPACE/tools/smoke_installed_package.py"

  pypi:
    name: Publish tested artifacts to PyPI
    if: github.ref_type == 'tag'
    needs: installed-wheel
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/aetnamem
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-distributions
          path: dist
      - name: Publish distributions
        uses: pypa/gh-action-pypi-publish@release/v1

  npm:
    name: Publish OpenClaw plugin to npm
    if: github.ref_type == 'tag'
    needs: openclaw-plugin
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: integrations/openclaw
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: integrations/openclaw/package-lock.json
      - name: Require tag to match plugin release
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          node -e '
            const pkg = require("./package.json");
            const expected = "v0.5.1";
            if (process.env.RELEASE_TAG !== expected || pkg.version !== "0.3.0") {
              throw new Error(`release ${process.env.RELEASE_TAG} must publish plugin 0.3.0`);
            }
          '
      - run: python -m pip install -e ../..
      - run: npm ci
      - name: Publish plugin unless this exact version already exists
        id: npm-publish
        continue-on-error: true
        run: |
          version=$(node -p 'require("./package.json").version')
          if npm view "openclaw-memory-aetnamem@$version" version >/dev/null 2>&1; then
            echo "openclaw-memory-aetnamem@$version is already published"
          else
            npm publish --access public --provenance
          fi
      - name: Report registry authorization requirement
        if: steps.npm-publish.outcome == 'failure'
        run: |
          echo "::warning::npm publication requires package-level trusted publishing or a 2FA-authorized local publish; Python and GitHub release publication will continue"

  release:
    name: Create GitHub release
    if: github.ref_type == 'tag'
    needs: [pypi, npm]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: release-distributions
          path: dist
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body_path: docs/releases/v0.5.1.md
          files: |
            dist/*
