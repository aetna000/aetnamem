name: ci

on:
  push:
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: pytest -q

  openclaw-plugin:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: integrations/openclaw
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: integrations/openclaw/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e ../..
      - run: npm ci
      - run: npm run typecheck
      - name: Run OpenClaw tests with visible failure annotation
        shell: bash
        run: |
          set +e
          output=$(npm test 2>&1)
          status=$?
          printf '%s\n' "$output"
          if [ "$status" -ne 0 ]; then
            output=${output//'%'/'%25'}
            output=${output//$'\r'/'%0D'}
            output=${output//$'\n'/'%0A'}
            echo "::error title=OpenClaw test failure::$output"
            exit "$status"
          fi
      - run: npm run smoke

  distribution:
    runs-on: ubuntu-latest
    needs: [unit-tests, openclaw-plugin]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build and validate distributions
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          python -m twine check dist/*
          python -m pip wheel --no-deps --wheel-dir rebuilt dist/*.tar.gz
      - uses: actions/upload-artifact@v4
        with:
          name: distributions
          path: dist/

  installed-wheel:
    runs-on: ubuntu-latest
    needs: distribution
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: actions/download-artifact@v4
        with:
          name: distributions
          path: dist
      - name: Install and exercise wheel
        run: |
          python -m pip install dist/*.whl
          python -m pip check
          cd "$RUNNER_TEMP"
          python "$GITHUB_WORKSPACE/tools/smoke_installed_package.py"

  benchmark-gate:
    # The public credibility story: a change only merges at 33/33 on
    # MemoryStackBench's seven_sins_v0_1 suite.
    runs-on: ubuntu-latest
    needs: [unit-tests, installed-wheel]
    steps:
      - uses: actions/checkout@v4
        with:
          path: aetnamem
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Clone MemoryStackBench
        run: git clone --depth 1 https://github.com/aetna000/MemoryStackBench.git
      - name: Overlay aetnamem adapter (until upstreamed)
        run: |
          cp aetnamem/bench/targets/aetnamem.yaml MemoryStackBench/targets/
          cp aetnamem/bench/adapters/aetnamem.py MemoryStackBench/memorybench/adapters/
      - name: Install benchmark
        run: pip install -e ./MemoryStackBench
      - name: Run seven_sins_v0_1
        working-directory: MemoryStackBench
        run: |
          python -m memorybench.cli run \
            --target targets/aetnamem.yaml \
            --suite suites/seven_sins_v0_1 \
            --out /tmp/bench-run
      - name: Require 33/33
        run: |
          python - <<'EOF'
          import json
          overall = json.load(open("/tmp/bench-run/scorecard.json"))["overall"]
          print(overall)
          assert overall["passed"] == overall["total"] == 33, "benchmark gate failed"
          EOF
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bench-run
          path: /tmp/bench-run
